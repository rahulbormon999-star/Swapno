<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>স্বপ্ন ব্যাখ্যা - AI ড্রিম ইন্টারপ্রিটার</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="manifest" href="/manifest.json">
     <meta name="theme-color" content="#10a37f">
    <style>
        :root{
            --bg-color:#ffffff;
            --sidebar-bg:#f9f9f9;
            --text-color:#0d0d0d;
            --border-color:#e5e5e5;
            --user-msg-bg:#f4f4f4;
            --font-family:'Noto Sans Bengali',sans-serif;
            --accent:#10a37f;
        }
        *{margin:0;padding:0;box-sizing:border-box;font-family:var(--font-family)}
        body{display:flex;height:100vh;background-color:var(--bg-color);color:var(--text-color);overflow:hidden;position:relative}
        .overlay{display:none;position:absolute;top:0;left:0;width:100%;height:100%;background-color:rgba(0,0,0,0.2);z-index:90}
        .overlay.active{display:block}
        .sidebar{position:absolute;left:-300px;top:0;height:100%;width:280px;background-color:var(--sidebar-bg);border-right:1px solid var(--border-color);display:flex;flex-direction:column;transition:left .3s ease;z-index:100}
        .sidebar.open{left:0; padding-top:10%}
        .sidebar-header{padding:30px 15px 15px 15px;display:flex;flex-direction:column;align-items:stretch;gap:10px;border-bottom:1px solid var(--border-color)}
        .religion-row{display:flex;gap:5px}
        .religion-btn{flex:1;padding:8px;border:1px solid var(--border-color);background:#fff;border-radius:5px;cursor:pointer;font-size:13px;transition:0.3s;font-family:var(--font-family)}
        .religion-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
        .new-chat-btn{padding:10px;background:transparent;border:1px solid var(--border-color);border-radius:5px;cursor:pointer;text-align:left;font-weight:500;font-family:var(--font-family)}
        .new-chat-btn:hover{background-color:#ececec}
        .history-list{flex-grow:1;overflow-y:auto;padding:10px}
        .history-item{
            padding:12px 10px;
            margin-bottom:5px;
            border-radius:5px;
            cursor:pointer;
            white-space:nowrap;
            overflow:hidden;
            text-overflow:ellipsis;
            font-size:14px;
            user-select:none;
            -webkit-user-select:none;
            position:relative;
            transition: background 0.2s;
        }
        .history-item:hover,.history-item.active{background-color:#ececec}
        .history-item.pressing{background-color:#fde8e8;}
        .clear-history{padding:15px;border-top:1px solid var(--border-color);cursor:pointer;color:red;text-align:center;font-weight:500}
        .main-content{flex-grow:1;display:flex;flex-direction:column;position:relative;width:100%}
        .header{padding:30px 20px 15px 20px;display:flex;align-items:center;position:sticky;top:0;background:var(--bg-color);z-index:10;border-bottom:1px solid var(--border-color)}
        .menu-btn{background:none;border:none;font-size:20px;cursor:pointer;margin-right:15px;color:#555}
        .chat-container{flex-grow:1;overflow-y:auto;padding:20px;padding-bottom:130px;scroll-behavior:smooth}
        .message-wrapper{display:flex;width:100%;margin-bottom:25px;clear:both}
        .message-wrapper.user{justify-content:flex-end}
        .message-wrapper.ai{justify-content:flex-start}
        .message{max-width:85%;line-height:1.7}
        .message-content{font-size:15px;white-space:pre-wrap}
        .message-wrapper.user .message-content{background-color:var(--user-msg-bg);padding:12px 18px;border-radius:20px;border-bottom-right-radius:4px}
        .message-wrapper.ai .message-content{padding:10px 5px;color:#202123}
        .input-container{position:absolute;bottom:3%;left:0;width:100%;padding:15px 20px 20px;background:linear-gradient(180deg,rgba(255,255,255,0) 0%,#fff 25%);display:flex;justify-content:center}
        .input-box{width:100%;max-width:750px;display:flex;align-items:flex-end;border:1px solid var(--border-color);border-radius:20px;background-color:white;box-shadow:0 4px 15px rgba(0,0,0,0.08);padding:5px 10px}
        textarea{width:100%;max-height:180px;min-height:48px;padding:12px 10px;border:none;outline:none;resize:none;font-size:17px;background:transparent;overflow-y:auto;font-family:var(--font-family)}
        .send-btn{background-color:var(--accent);color:white;border:none;width:36px;height:36px;border-radius:10px;margin:6px 4px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.2s}
        .send-btn:hover{background-color:#0d8f6e}
        .send-btn:disabled{background-color:#ccc;cursor:not-allowed}
        .welcome{text-align:center;margin-top:80px;color:#999;padding:20px}
        .welcome .logo{font-size:64px;margin-bottom:15px}
        .welcome h3{font-size:20px;color:#555;margin-bottom:8px}
        .welcome p{font-size:14px}
        .typing-indicator{color:#aaa;font-style:italic}
        textarea::placeholder{font-size:16px;}

        /* Delete Confirm Modal */
        .modal-overlay{
            display:none;
            position:fixed;
            top:0;left:0;width:100%;height:100%;
            background:rgba(0,0,0,0.4);
            z-index:999;
            align-items:center;
            justify-content:center;
        }
        .modal-overlay.show{display:flex}
        .modal-box{
            background:#fff;
            border-radius:14px;
            padding:24px 20px;
            width:280px;
            text-align:center;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
        }
        .modal-box p{font-size:15px;color:#333;margin-bottom:20px;line-height:1.6}
        .modal-box .modal-title{font-size:17px;font-weight:600;margin-bottom:8px;color:#111}
        .modal-btns{display:flex;gap:10px;justify-content:center}
        .modal-btns button{
            flex:1;padding:10px;border:none;border-radius:8px;
            font-size:15px;cursor:pointer;font-family:var(--font-family);font-weight:500;
        }
        .btn-cancel{background:#f0f0f0;color:#333}
        .btn-ok{background:#e74c3c;color:#fff}
        .btn-cancel:hover{background:#e0e0e0}
        .btn-ok:hover{background:#c0392b}

        @media (min-width: 768px) {
            .sidebar{position:relative;left:0}
            .overlay{display:none !important}
            .menu-btn{display:none}
        }
    </style>
</head>
<body>

<!-- Delete Confirm Modal -->
<div class="modal-overlay" id="delete-modal">
    <div class="modal-box">
        <div class="modal-title">🗑️ হিস্টরি মুছবেন?</div>
        <p>এই স্বপ্নের আলোচনাটি স্থায়ীভাবে মুছে যাবে।</p>
        <div class="modal-btns">
            <button class="btn-cancel" onclick="closeDeleteModal()">বাতিল</button>
            <button class="btn-ok" onclick="confirmDelete()">মুছুন</button>
        </div>
    </div>
</div>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <div class="religion-row">
            <button class="religion-btn active" id="btn-sanatan" onclick="setReligion('sanatan')">🕉️ সনাতন</button>
            <button class="religion-btn" id="btn-islam" onclick="setReligion('islam')">☪️ ইসলাম</button>
        </div>
        <button class="new-chat-btn" onclick="startNewChat()">✦ নতুন স্বপ্ন</button>
    </div>
    <div class="history-list" id="history-list"></div>
    <div class="clear-history" onclick="clearAllHistory()">
        <i class="fa-solid fa-trash"></i> সব হিস্ট্রি মুছুন
    </div>
</div>

<div class="main-content">
    <div class="header">
        <button class="menu-btn" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
        <h2 id="header-title" style="font-size:18px;font-weight:600;">🕉️ স্বপ্ন শাস্ত্র (সনাতন)</h2>
    </div>
    <div class="chat-container" id="chat-container">
        <div class="welcome" id="welcome-screen">
            <div class="logo" id="center-logo">🕉️</div>
            <h3>আপনার স্বপ্নের অর্থ জানুন</h3>
            <p>নিচে আপনার স্বপ্নের কথা বিস্তারিত লিখুন</p>
        </div>
    </div>
    <div class="input-container">
        <div class="input-box">
            <textarea id="user-input" placeholder="আপনার স্বপ্নের কথা লিখুন..." rows="1"
                oninput="autoResize(this)" onkeypress="handleEnter(event)"></textarea>
            <button class="send-btn" id="send-btn" onclick="sendMessage()">
                <i class="fa-solid fa-arrow-up"></i>
            </button>
        </div>
    </div>
</div>

<script>
    const API_URL = '/api/interpret';

    const chatContainer = document.getElementById('chat-container');
    const userInput     = document.getElementById('user-input');
    const sendBtn       = document.getElementById('send-btn');
    const sidebar       = document.getElementById('sidebar');
    const overlay       = document.getElementById('overlay');
    const historyList   = document.getElementById('history-list');
    const deleteModal   = document.getElementById('delete-modal');

    let chatSessions     = JSON.parse(localStorage.getItem('dreamChatSessions') || '[]');
    let currentSessionId = null;
    let selectedReligion = localStorage.getItem('religion') || 'sanatan';
    let deleteTargetId   = null; // long press এ যে id delete হবে

    function toggleSidebar(){ sidebar.classList.toggle('open'); overlay.classList.toggle('active'); }
    function autoResize(t){ t.style.height='auto'; t.style.height=t.scrollHeight+'px'; }
    function handleEnter(e){ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendMessage(); } }
    function formatText(t){ return t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>'); }

    // ========== DELETE MODAL ==========
    function openDeleteModal(id){
        deleteTargetId = id;
        deleteModal.classList.add('show');
    }
    function closeDeleteModal(){
        deleteTargetId = null;
        deleteModal.classList.remove('show');
    }
    function confirmDelete(){
        if(!deleteTargetId) return;
        chatSessions = chatSessions.filter(x => x.id !== deleteTargetId);
        localStorage.setItem('dreamChatSessions', JSON.stringify(chatSessions));
        // যদি চলমান session delete হয় তাহলে new chat
        if(currentSessionId === deleteTargetId){
            currentSessionId = null;
            startNewChat();
        } else {
            updateHistoryUI();
        }
        closeDeleteModal();
    }

    // ========== SEND MESSAGE ==========
    async function sendMessage(){
        const text = userInput.value.trim();
        if(!text) return;

        if(!currentSessionId) chatContainer.innerHTML = '';

        appendMessage('user', text);
        userInput.value=''; userInput.style.height='auto';
        sendBtn.disabled = true;
        saveMessageToSession('user', text);

        const aiDiv = appendMessage('ai', '<span class="typing-indicator">শাস্ত্র বিশ্লেষণ করা হচ্ছে...</span>');

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify({ dream: text, religion: selectedReligion })
            });
            const data = await response.json();
            if(!response.ok) throw new Error(data.error || 'সার্ভার ত্রুটি');
            typeWriterEffect(data.text, aiDiv);
            saveMessageToSession('ai', data.text);
        } catch(err){
            aiDiv.innerHTML = `<em style="color:#c0392b">⚠️ ${err.message}</em>`;
        }
        sendBtn.disabled = false;
    }

    function appendMessage(sender, html){
        const w = document.createElement('div');
        w.className = `message-wrapper ${sender}`;
        const m = document.createElement('div');
        m.className = 'message';
        m.innerHTML = `<div class="message-content">${formatText(html)}</div>`;
        w.appendChild(m);
        chatContainer.appendChild(w);
        chatContainer.scrollTop = chatContainer.scrollHeight;
        return m.querySelector('.message-content');
    }

    function typeWriterEffect(text, el){
        el.innerHTML = '';
        const formatted = formatText(text);
        let i = 0;
        function type(){
            if(i >= formatted.length) return;
            if(formatted[i] === '<'){
                let tag = '';
                while(i < formatted.length && formatted[i] !== '>') tag += formatted[i++];
                tag += '>'; i++;
                el.innerHTML += tag;
            } else {
                el.innerHTML += formatted[i++];
            }
            chatContainer.scrollTop = chatContainer.scrollHeight;
            setTimeout(type, 8);
        }
        type();
    }

    function setReligion(type){
        selectedReligion = type;
        localStorage.setItem('religion', type);
        document.getElementById('btn-sanatan').classList.toggle('active', type==='sanatan');
        document.getElementById('btn-islam').classList.toggle('active', type==='islam');
        const logo = type==='sanatan'?'🕉️':'☪️';
        const name = type==='sanatan'?'সনাতন':'ইসলাম';
        document.getElementById('header-title').innerText = `${logo} স্বপ্ন শাস্ত্র (${name})`;
        const cl = document.getElementById('center-logo');
        if(cl) cl.innerText = logo;
    }

    function saveMessageToSession(role, text){
        if(!currentSessionId){
            currentSessionId = Date.now().toString();
            chatSessions.unshift({
                id: currentSessionId,
                title: text.substring(0,32)+(text.length>32?'…':''),
                religion: selectedReligion,
                messages: []
            });
            if(chatSessions.length > 30) chatSessions.pop();
        }
        const s = chatSessions.find(x=>x.id===currentSessionId);
        if(s) s.messages.push({role, text});
        localStorage.setItem('dreamChatSessions', JSON.stringify(chatSessions));
        updateHistoryUI();
    }

    function loadSession(id){
        currentSessionId = id;
        chatContainer.innerHTML = '';
        const s = chatSessions.find(x=>x.id===id);
        if(s){
            setReligion(s.religion||'sanatan');
            s.messages.forEach(m=>{
                const w=document.createElement('div'); w.className=`message-wrapper ${m.role}`;
                const d=document.createElement('div'); d.className='message';
                d.innerHTML=`<div class="message-content">${formatText(m.text)}</div>`;
                w.appendChild(d); chatContainer.appendChild(w);
            });
            chatContainer.scrollTop=chatContainer.scrollHeight;
        }
        if(window.innerWidth<768&&sidebar.classList.contains('open')) toggleSidebar();
        updateHistoryUI();
    }

    function updateHistoryUI(){
        historyList.innerHTML = '';
        chatSessions.forEach(s => {
            const div = document.createElement('div');
            div.className = 'history-item' + (s.id === currentSessionId ? ' active' : '');
            div.innerText = s.title;
            div.setAttribute('data-id', s.id);

            // ── সাধারণ ক্লিক → session লোড ──
            div.addEventListener('click', function(){
                loadSession(this.getAttribute('data-id'));
            });

            // ── Long Press (touch) → delete modal ──
            let pressTimer = null;
            div.addEventListener('touchstart', function(e){
                const id = this.getAttribute('data-id');
                div.classList.add('pressing');
                pressTimer = setTimeout(() => {
                    div.classList.remove('pressing');
                    openDeleteModal(id);
                }, 600); // ৬০০ms চেপে ধরলে
            }, {passive: true});

            div.addEventListener('touchend', function(){
                clearTimeout(pressTimer);
                div.classList.remove('pressing');
            });
            div.addEventListener('touchmove', function(){
                clearTimeout(pressTimer);
                div.classList.remove('pressing');
            });

            // ── Desktop: right click বা ২ সেকেন্ড mousedown → delete modal ──
            div.addEventListener('contextmenu', function(e){
                e.preventDefault();
                openDeleteModal(this.getAttribute('data-id'));
            });

            historyList.appendChild(div);
        });
    }

    function startNewChat(){
        const logo = selectedReligion==='sanatan'?'🕉️':'☪️';
        chatContainer.innerHTML = `
            <div class="welcome" id="welcome-screen">
                <div class="logo" id="center-logo">${logo}</div>
                <h3>আপনার স্বপ্নের অর্থ জানুন</h3>
                <p>নিচে আপনার স্বপ্নের কথা বিস্তারিত লিখুন</p>
            </div>`;
        currentSessionId = null;
        if(window.innerWidth<768&&sidebar.classList.contains('open')) toggleSidebar();
        updateHistoryUI();
    }

    function clearAllHistory(){
        if(confirm('সব হিস্ট্রি মুছে ফেলবেন?')){
            chatSessions = [];
            localStorage.removeItem('dreamChatSessions');
            startNewChat();
        }
    }

    window.onload = () => { setReligion(selectedReligion); updateHistoryUI(); };
    
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/sw.js")
      .then(reg => console.log("PWA Ready"))
      .catch(err => console.log(err));
  });
}
</script>
</body>
</html>
